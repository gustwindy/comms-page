<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>windy's commission page editor</title>
    <link rel="stylesheet" href="editor.css">
</head>
<body>
    <div class="content">
        <span>apologizes on how the editor looks! i tried to focus more on functionality.</span><br>
        <span>it'll be better at some point.</span><br>
        <br>
        <span class="upload">upload the html page: <input type="file" class="template"></span>
        <h1>
            preview
        </h1>
        <div class="preview">
            <iframe></iframe>
        </div>
        <button class="export">Export</button>
        <div class="elements">
            <h1>
                elements
            </h1>
            <div class="element-list">
                
            </div>
        </div>
        <div class="editable">
            <div class="topbar">
                <h1>properties: <span class="selected"></span></h1>
                <textarea id="text-edit" class="prop visible">
                </textarea>
                <label for="opt"></label>
                <select name="opt" form="opt" id="options-edit" class="prop">
                    <option>1</option>
                </select>
            </div>
            <button class="update">Update</button>
        </div>
    </div>
    <script src="editor.js" defer></script>
</body>
</html>
